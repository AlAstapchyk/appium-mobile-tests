name: Mobile Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  mobile-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Setup Appium
        run: |
          npm i -g appium
          appium driver install uiautomator2
      - name: Download Demo App
        run: |
          mkdir -p apps
          curl -L "https://github.com/saucelabs/my-demo-app-rn/releases/download/v2.0.1/mda-2.0.1-22.apk" -o apps/mda-2.0.1-22.apk
      - name: Run Appium Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          script: |
            appium &
            sleep 10
            mvn clean test
